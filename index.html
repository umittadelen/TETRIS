<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<meta name="description" content="Classic Tetris game – play in your browser on desktop or mobile">
<meta property="og:title" content="Tetris – All In Edition">
<meta property="og:description" content="Classic Tetris game with touch controls. Play in your browser!">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='4' width='12' height='12' fill='%2300f' rx='1'/><rect x='16' y='4' width='12' height='12' fill='%23ff0' rx='1'/><rect x='4' y='16' width='12' height='12' fill='%23f00' rx='1'/><rect x='16' y='16' width='12' height='12' fill='%230f0' rx='1'/></svg>">
<title>Tetris</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #111;
    font-family: 'Arial', sans-serif;
    color: #fff;
    overflow: hidden;
    height: 100%;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }
  #game-wrapper {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #board-canvas {
    border: 2px solid #fff;
  }
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .panel-box {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 10px 12px;
  }
  .panel-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .panel-value {
    font-size: 20px;
    font-weight: bold;
    color: #fff;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  #overlay h1 { font-size: 48px; color: #fff; letter-spacing: 4px; margin-bottom: 10px; }
  #overlay .sub { font-size: 16px; color: #aaa; margin-bottom: 30px; }
  #overlay .final-score { font-size: 24px; color: #ffd700; margin-bottom: 20px; }
  #overlay button {
    padding: 12px 32px;
    font-size: 18px;
    background: #fff;
    color: #111;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
  }
  #overlay button:hover { background: #ddd; }
  .controls-hint {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  #pause-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9;
  }
  #pause-overlay h2 { font-size: 40px; color: #fff; letter-spacing: 4px; margin-bottom: 12px; }
  #pause-overlay p  { font-size: 14px; color: #aaa; letter-spacing: 2px; margin-bottom: 24px; }
  #pause-overlay button {
    padding: 10px 28px;
    font-size: 15px;
    background: #fff;
    color: #111;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
  }
  #pause-overlay button:hover { background: #ddd; }
  #confirm-no:hover { background: #666 !important; }

  /* ─── MOBILE TOUCH CONTROLS ──────────────────────────────── */
  #mobile-controls {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 8px 6px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    z-index: 5;
    justify-content: center;
    gap: 6px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
  }
  .touch-btn-group {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .touch-btn {
    width: 52px;
    height: 52px;
    border: none;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.1s;
    outline: none;
  }
  .touch-btn:active, .touch-btn.pressed {
    background: rgba(255,255,255,0.25);
  }
  .touch-btn.wide {
    width: 62px;
    font-size: 13px;
    letter-spacing: 1px;
  }
  .touch-btn svg { width: 24px; height: 24px; fill: #fff; }
  #mobile-top-bar {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 6px 12px;
    padding-top: max(6px, env(safe-area-inset-top));
    z-index: 5;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(rgba(0,0,0,0.8), transparent);
  }
  .mobile-stat {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 1px;
  }
  .mobile-stat span {
    color: #fff;
    font-weight: bold;
    font-size: 14px;
  }
  .mobile-pause-btn {
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    outline: none;
  }

  /* ─── RESPONSIVE ─────────────────────────────────────────── */
  /* Show mobile controls on small screens */
  @media (max-width: 600px), (max-height: 500px) and (orientation: landscape) {
    .side-panel { display: none !important; }
    .controls-hint { display: none; }
    #mobile-controls { display: flex; }
    #mobile-top-bar  { display: flex; }
    #game-wrapper { gap: 0; }
    #board-canvas { border-width: 1px; }
  }
  /* Also show on any touch-capable device (set via JS) */
  body.has-touch #mobile-controls { display: flex; }
  body.has-touch #mobile-top-bar  { display: flex; }
  body.has-touch .controls-hint   { display: none; }
</style>
</head>
<body>

<div id="game-wrapper">
  <!-- Left panel -->
  <div class="side-panel" style="align-items:flex-end;">
    <div class="panel-box">
      <div class="panel-label">Hold</div>
      <canvas id="hold-canvas"></canvas>
    </div>
    <div class="panel-box">
      <div class="panel-label">Score</div>
      <div class="panel-value" id="score-val">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Level</div>
      <div class="panel-value" id="level-val">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Lines</div>
      <div class="panel-value" id="lines-val">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Best</div>
      <div class="panel-value" id="best-val">0</div>
    </div>
  </div>

  <!-- Main board -->
  <canvas id="board-canvas"></canvas>

  <!-- Right panel -->
  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">Next</div>
      <canvas id="next-canvas"></canvas>
    </div>
  </div>
</div>

<div id="overlay">
  <h1>TETRIS</h1>
  <div class="sub">ALL IN EDITION</div>
  <div class="final-score" id="final-score" style="display:none"></div>
  <button id="start-btn">START GAME</button>
</div>

<div id="pause-overlay">
  <h2>PAUSED</h2>
  <p>Press ESC to resume</p>
  <button id="new-game-btn">NEW GAME</button>

  <!-- Confirmation panel -->
  <div id="confirm-panel" style="display:none; margin-top:20px; text-align:center;">
    <p style="margin-bottom:14px; color:#fff; font-size:13px; letter-spacing:1px;">Are you sure? This will reset the current game.</p>
    <div style="display:flex; gap:12px; justify-content:center;">
      <button id="confirm-yes">YES, RESET</button>
      <button id="confirm-no" style="background:#444; color:#fff;">CANCEL</button>
    </div>
  </div>
</div>

<div class="controls-hint" id="desktop-controls-hint">
  ← → Move &nbsp;|&nbsp; ↑ Rotate &nbsp;|&nbsp; ↓ Soft Drop &nbsp;|&nbsp; Space Hard Drop &nbsp;|&nbsp; Shift / C Hold &nbsp;|&nbsp; Esc Pause
</div>

<!-- Mobile top bar (score/level + pause) -->
<div id="mobile-top-bar">
  <div class="mobile-stat">SCR <span id="m-score">0</span></div>
  <div class="mobile-stat">LVL <span id="m-level">0</span></div>
  <div class="mobile-stat">LNS <span id="m-lines">0</span></div>
  <button class="mobile-pause-btn" id="m-pause">⏸</button>
</div>

<!-- Mobile bottom buttons -->
<div id="mobile-controls">
  <div class="touch-btn-group">
    <button class="touch-btn" id="tb-left" aria-label="Move Left">◀</button>
    <button class="touch-btn" id="tb-down" aria-label="Soft Drop">▼</button>
    <button class="touch-btn" id="tb-right" aria-label="Move Right">▶</button>
  </div>
  <div class="touch-btn-group">
    <button class="touch-btn wide" id="tb-rotate" aria-label="Rotate">↻</button>
    <button class="touch-btn wide" id="tb-hard" aria-label="Hard Drop">⤓</button>
    <button class="touch-btn wide" id="tb-hold" aria-label="Hold">HOLD</button>
  </div>
</div>

<audio id="bg-music" src="tetris.mp3" loop preload="auto"></audio>

<script>
// Detect touch capability and add class for CSS
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.body.classList.add('has-touch');
}
const bgMusic = document.getElementById('bg-music');
bgMusic.volume = 0.5;

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const COLS  = 10;
const ROWS  = 22;

// Detect mobile
const isMobile = /Mobi|Android|iPhone|iPad|iPod|Touch/i.test(navigator.userAgent) || window.innerWidth <= 600;

// Fit board within viewport (leave room for controls hint + padding)
// On mobile, reserve space for top bar (44px) and bottom buttons (70px)
const mobileReserve = isMobile ? 130 : 60;
const maxBlockW = Math.floor((window.innerWidth * (isMobile ? 0.95 : 1) - 40) / COLS);
const maxBlockH = Math.floor((window.innerHeight - mobileReserve) / ROWS);
const BLOCK = Math.max(14, Math.min(maxBlockW, maxBlockH));

// Colors matching Python version
const COLORS = [
  '#add8e6', // I - light blue
  '#0000ff', // J - blue
  '#ffa500', // L - orange
  '#ffff00', // O - yellow
  '#ff0000', // S - red
  '#e6e6fa', // T - lavender
  '#00ff00', // Z - green
];

const SHAPES = [
  [[1,1,1,1]],               // I
  [[1,0,0],[1,1,1]],         // J
  [[0,0,1],[1,1,1]],         // L
  [[1,1],[1,1]],             // O
  [[0,1,1],[1,1,0]],         // S
  [[0,1,0],[1,1,1]],         // T
  [[1,1,0],[0,1,1]],         // Z
];

// NES speed table (ms per row)
const SPEED = {
  0:800,1:717,2:633,3:550,4:467,5:383,6:300,7:217,8:133,9:100,
  10:83,11:83,12:83,13:67,14:67,15:67,16:50,17:50,18:50,
  19:33,20:33,21:33,22:33,23:33,24:33,25:33,26:33,27:33,28:33,29:17
};

// SRS kick tables
const KICKS_JLSTZ = {
  '0>1': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
  '1>2': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
  '2>3': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
  '3>0': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
};
const KICKS_I = {
  '0>1': [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
  '1>2': [[0,0],[-1,0],[2,0],[-1,-2],[2,1]],
  '2>3': [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
  '3>0': [[0,0],[1,0],[-2,0],[1,2],[-2,-1]],
};

// DAS/ARR
const DAS = 150;
const ARR = 40;

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const MINI = Math.max(16, Math.round(BLOCK * 0.75));
const SIDE_W = 4 * MINI + 10;
const SIDE_H = 3 * MINI + 10;

const boardCanvas = document.getElementById('board-canvas');
boardCanvas.width  = COLS * BLOCK;
boardCanvas.height = ROWS * BLOCK;
const ctx  = boardCanvas.getContext('2d');

const holdCanvas = document.getElementById('hold-canvas');
holdCanvas.width  = SIDE_W;
holdCanvas.height = SIDE_H;
const hctx = holdCanvas.getContext('2d');

const nextCanvas = document.getElementById('next-canvas');
nextCanvas.width  = SIDE_W;
nextCanvas.height = SIDE_H;
const nctx = nextCanvas.getContext('2d');

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let grid, piece, nextIdx, heldIdx, canHold;
let score, level, linesCleared, combo, b2b;
let lastActionRotation, pieceRotation;
let bag;
let dropTimer, lastTime;
let messages;
let gameRunning = false;
let gamePaused  = false;
let animFrame;

// Lock delay
const LOCK_DELAY = 500;
const MAX_LOCK_RESETS = 15;
let lockTimer = 0, lockDelayActive = false, lockResets = 0;

// Line clear animation
let lineClearAnim = null; // { rows, timer, total, num, lv, prevB2b }

// Board shake
let shakeTimer = 0, shakeAmt = 0;

// Piece enter animation
let pieceEnterAnim = 0; // ms remaining

// High score
let highScore = parseInt(localStorage.getItem('tetrisHigh') || '0');

// Key state
const keys = {};
const keyHeld    = {ArrowLeft: false, ArrowRight: false, ArrowDown: false};
const keyPress   = {ArrowLeft: 0,     ArrowRight: 0,     ArrowDown: 0};
const keyRepeat  = {ArrowLeft: 0,     ArrowRight: 0,     ArrowDown: 0};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getSpeed() {
  let spd = SPEED[0];
  for (const k of Object.keys(SPEED).map(Number).sort((a,b)=>a-b)) {
    if (level >= k) spd = SPEED[k];
  }
  return spd;
}

function nextFromBag() {
  if (!bag.length) {
    bag = [...Array(SHAPES.length).keys()];
    // shuffle
    for (let i = bag.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
  }
  return bag.pop();
}

function rotateCW(shape) {
  const rows = shape.length, cols = shape[0].length;
  const result = Array.from({length:cols}, () => Array(rows).fill(0));
  for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++)
      result[c][rows-1-r] = shape[r][c];
  return result;
}

function collides(px, py, shape) {
  for (let r=0; r<shape.length; r++)
    for (let c=0; c<shape[r].length; c++)
      if (shape[r][c]) {
        const x = px+c, y = py+r;
        if (x<0 || x>=COLS || y>=ROWS) return true;
        if (y>=0 && grid[y][x] !== null) return true;
      }
  return false;
}

function cellOccupied(r, c) {
  if (r<0 || r>=ROWS || c<0 || c>=COLS) return true;
  return grid[r][c] !== null;
}

// ─── PIECE MANAGEMENT ────────────────────────────────────────────────────────
function newPiece() {
  piece = {
    idx: nextIdx,
    shape: SHAPES[nextIdx].map(r=>[...r]),
    x: Math.floor(COLS/2) - Math.floor(SHAPES[nextIdx][0].length/2),
    y: 0,
    rot: 0,
  };
  nextIdx = nextFromBag();
  canHold = true;
  lastActionRotation = false;
  pieceRotation = 0;
  lockResets = 0;
  if (collides(piece.x, piece.y, piece.shape)) {
    endGame();
  }
  pieceEnterAnim = 180;
  renderNext();
}

function rotatePiece() {
  const rotated = rotateCW(piece.shape);
  const newRot = (pieceRotation + 1) % 4;
  const key = `${pieceRotation}>${newRot}`;
  let kicks;
  if (piece.idx === 0)      kicks = KICKS_I[key]      || [[0,0]];
  else if (piece.idx === 3) return; // O – no rotation
  else                      kicks = KICKS_JLSTZ[key]  || [[0,0]];

  for (const [dx, dy] of kicks) {
    if (!collides(piece.x+dx, piece.y+dy, rotated)) {
      piece.x += dx;
      piece.y += dy;
      piece.shape = rotated;
      pieceRotation = newRot;
      lastActionRotation = true;
      if (lockDelayActive && lockResets < MAX_LOCK_RESETS) {
        lockTimer = 0;
        lockResets++;
      }
      return;
    }
  }
}

function holdPiece() {
  if (!canHold) return;
  canHold = false;
  if (heldIdx === null) {
    heldIdx = piece.idx;
    newPiece();
  } else {
    const tmp = heldIdx;
    heldIdx = piece.idx;
    piece = {
      idx: tmp,
      shape: SHAPES[tmp].map(r=>[...r]),
      x: Math.floor(COLS/2) - Math.floor(SHAPES[tmp][0].length/2),
      y: 0,
      rot: 0,
    };
    pieceRotation = 0;
    lastActionRotation = false;
    if (collides(piece.x, piece.y, piece.shape)) endGame();
  }
  renderHold();
}

function movePiece(dx, dy) {
  if (!collides(piece.x+dx, piece.y+dy, piece.shape)) {
    piece.x += dx;
    piece.y += dy;
    if (dx !== 0) {
      lastActionRotation = false;
      if (lockDelayActive && lockResets < MAX_LOCK_RESETS) {
        lockTimer = 0;
        lockResets++;
        if (!collides(piece.x, piece.y+1, piece.shape)) lockDelayActive = false;
      }
    }
    if (dy > 0) { lockDelayActive = false; lockTimer = 0; lockResets = 0; }
    return true;
  } else if (dy > 0) {
    if (!lockDelayActive) { lockDelayActive = true; lockTimer = 0; }
    return false;
  }
  return false;
}

function hardDrop() {
  let dist = 0;
  while (!collides(piece.x, piece.y+1, piece.shape)) { piece.y++; dist++; }
  lockDelayActive = false; lockTimer = 0;
  lockPiece(dist, true);
}

function ghostY() {
  let gy = piece.y;
  while (!collides(piece.x, gy+1, piece.shape)) gy++;
  return gy;
}

// ─── T-SPIN DETECTION ────────────────────────────────────────────────────────
function detectTspin() {
  if (piece.idx !== 5 || !lastActionRotation) return null;
  const cy = piece.y + 1, cx = piece.x + 1;
  const corners = [
    cellOccupied(cy-1, cx-1), cellOccupied(cy-1, cx+1),
    cellOccupied(cy+1, cx-1), cellOccupied(cy+1, cx+1),
  ];
  const count = corners.filter(Boolean).length;
  if (count >= 3) return 'tspin';
  const frontPairs = {
    0: [corners[2], corners[3]],
    1: [corners[0], corners[2]],
    2: [corners[0], corners[1]],
    3: [corners[1], corners[3]],
  };
  const [f1, f2] = frontPairs[pieceRotation];
  if (f1 && f2) return 'tspin';
  if (count >= 2) return 'mini';
  return null;
}

// ─── LOCK & CLEAR ────────────────────────────────────────────────────────────
function lockPiece(dropDist, isHard) {
  score += dropDist * (isHard ? 2 : 1);
  lockDelayActive = false; lockTimer = 0;
  const tspin = detectTspin();
  for (let r=0; r<piece.shape.length; r++)
    for (let c=0; c<piece.shape[r].length; c++)
      if (piece.shape[r][c] && piece.y+r >= 0)
        grid[piece.y+r][piece.x+c] = COLORS[piece.idx];
  const animStarted = clearLines(tspin);
  if (!animStarted) newPiece();
  dropTimer = 0;
}

function clearLines(tspin) {
  const full = [];
  for (let r=0; r<ROWS; r++)
    if (grid[r].every(c => c !== null)) full.push(r);
  const num = full.length;
  const lv = level + 1;
  const prevB2b = b2b;

  let actionScore = 0, msg = '', isDifficult = false;

  if (tspin === 'tspin') {
    const sc = {0:400,1:800,2:1200,3:1600};
    const ms = {0:'T-SPIN!',1:'T-SPIN SINGLE',2:'T-SPIN DOUBLE',3:'T-SPIN TRIPLE'};
    isDifficult = true;
    actionScore = (sc[num]||0) * lv;
    msg = ms[num] || 'T-SPIN';
  } else if (tspin === 'mini') {
    const sc = {0:100,1:200,2:400};
    const ms = {0:'MINI T-SPIN',1:'MINI T-SPIN SINGLE',2:'MINI T-SPIN DOUBLE'};
    isDifficult = num > 0;
    actionScore = (sc[num]||0) * lv;
    msg = ms[num] || 'MINI T-SPIN';
  } else {
    const sc = {1:100,2:300,3:500,4:800};
    const ms = {1:'SINGLE',2:'DOUBLE',3:'TRIPLE',4:'TETRIS!'};
    isDifficult = num === 4;
    actionScore = (sc[num]||0) * lv;
    msg = ms[num] || '';
  }

  if (actionScore > 0 || num > 0) {
    if (isDifficult && prevB2b && num > 0) {
      actionScore = Math.floor(actionScore * 1.5);
      msg += ' B2B!';
    }
    if (isDifficult)     b2b = true;
    else if (num > 0)    b2b = false;

    score += actionScore;

    if (num > 0) {
      combo++;
      if (combo > 0) {
        score += 50 * combo * lv;
        msg += ` COMBO x${combo}`;
      }
    } else {
      combo = -1;
    }
    if (msg) spawnMessage(msg);
  } else {
    combo = -1;
  }

  if (num > 0) {
    // Shake on big clears
    if (num === 4 || tspin === 'tspin') triggerShake(num === 4 ? 8 : 5);
    // Start animation – actual row removal deferred to game loop
    lineClearAnim = { rows: full, timer: 0, total: 300, num, lv, prevB2b };
    linesCleared += num;
    const newLevel = Math.floor(linesCleared / 10);
    if (newLevel !== level) level = newLevel;
    updateUI();
    return true; // caller must NOT call newPiece yet
  }

  // Remove rows immediately when no animation (num === 0 case never reaches here, but safe)
  updateUI();
  return false;
}

// ─── FLOATING MESSAGES ───────────────────────────────────────────────────────
function spawnMessage(text) {
  const py = piece ? Math.max(piece.y * BLOCK + 20, BLOCK * 3) : ROWS * BLOCK * 0.35;
  messages.push({ text, x: (COLS*BLOCK)/2, y: py, alpha: 1, vy: -1.2, life: 80 });
}

// ─── SHAKE ───────────────────────────────────────────────────────────────────
function triggerShake(intensity) {
  shakeAmt   = intensity;
  shakeTimer = 350;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function shadeColor(hex, pct) {
  // pct: positive = lighten, negative = darken
  const n = parseInt(hex.replace('#',''), 16);
  let r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;
  r = Math.min(255, Math.max(0, r + Math.round(255 * pct)));
  g = Math.min(255, Math.max(0, g + Math.round(255 * pct)));
  b = Math.min(255, Math.max(0, b + Math.round(255 * pct)));
  return `rgb(${r},${g},${b})`;
}

function drawBlock(context, x, y, color, alpha=1, outlineOnly=false) {
  context.globalAlpha = alpha;
  const px = x * BLOCK, py = y * BLOCK, S = BLOCK;
  const B = Math.max(2, Math.floor(S * 0.15)); // bevel size

  if (outlineOnly) {
    context.strokeStyle = color;
    context.lineWidth = 1;
    context.strokeRect(px + 0.5, py + 0.5, S - 1, S - 1);
  } else {
    // Main face
    context.fillStyle = color;
    context.fillRect(px, py, S, S);

    // Top-left highlight (trapezoid)
    context.fillStyle = shadeColor(color, 0.45);
    context.beginPath();
    context.moveTo(px,     py);
    context.lineTo(px + S, py);
    context.lineTo(px + S - B, py + B);
    context.lineTo(px + B, py + B);
    context.lineTo(px + B, py + S - B);
    context.lineTo(px,     py + S);
    context.closePath();
    context.fill();

    // Bottom-right shadow (trapezoid)
    context.fillStyle = shadeColor(color, -0.35);
    context.beginPath();
    context.moveTo(px + S, py);
    context.lineTo(px + S, py + S);
    context.lineTo(px,     py + S);
    context.lineTo(px + B, py + S - B);
    context.lineTo(px + S - B, py + S - B);
    context.lineTo(px + S - B, py + B);
    context.closePath();
    context.fill();

    // Inner face (slightly darker center to give depth)
    context.fillStyle = shadeColor(color, -0.08);
    context.fillRect(px + B, py + B, S - B*2, S - B*2);

    // Thin dark border
    context.strokeStyle = 'rgba(0,0,0,0.55)';
    context.lineWidth = 1;
    context.strokeRect(px + 0.5, py + 0.5, S - 1, S - 1);
  }
  context.globalAlpha = 1;
}

function drawMiniPiece(context, shapeIdx, canvasW, canvasH) {
  context.clearRect(0, 0, canvasW, canvasH);
  if (shapeIdx === null) return;
  const shape = SHAPES[shapeIdx];
  const color = COLORS[shapeIdx];
  const mini  = MINI;
  const offX  = Math.floor((canvasW - shape[0].length * mini) / 2);
  const offY  = Math.floor((canvasH - shape.length    * mini) / 2);
  for (let r=0; r<shape.length; r++)
    for (let c=0; c<shape[r].length; c++)
      if (shape[r][c]) {
        context.fillStyle = color;
        context.fillRect(offX+c*mini, offY+r*mini, mini-1, mini-1);
      }
}

function renderHold() { drawMiniPiece(hctx, heldIdx, holdCanvas.width, holdCanvas.height); }
function renderNext()  { drawMiniPiece(nctx, nextIdx,  nextCanvas.width, nextCanvas.height); }

function render() {
  ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);

  // Board shake
  ctx.save();
  if (shakeTimer > 0) {
    const mag = shakeAmt * (shakeTimer / 350);
    ctx.translate((Math.random()-0.5)*mag*2, (Math.random()-0.5)*mag*2);
  }

  // Grid background + subtle grid lines
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
  ctx.strokeStyle = '#1c1c1c';
  ctx.lineWidth = 0.5;
  for (let r=0; r<=ROWS; r++) { ctx.beginPath(); ctx.moveTo(0,r*BLOCK); ctx.lineTo(COLS*BLOCK,r*BLOCK); ctx.stroke(); }
  for (let c=0; c<=COLS; c++) { ctx.beginPath(); ctx.moveTo(c*BLOCK,0); ctx.lineTo(c*BLOCK,ROWS*BLOCK); ctx.stroke(); }

  // Placed blocks
  if (grid) {
    for (let r=0; r<ROWS; r++)
      for (let c=0; c<COLS; c++)
        if (grid[r][c]) drawBlock(ctx, c, r, grid[r][c]);
  }

  // Line clear animation flash
  if (lineClearAnim) {
    const t = lineClearAnim.timer / lineClearAnim.total;
    const flash = Math.abs(Math.sin(t * Math.PI * 4)) * (1 - t * 0.4);
    ctx.globalAlpha = flash;
    ctx.fillStyle = '#fff';
    for (const r of lineClearAnim.rows) {
      ctx.fillRect(0, r * BLOCK, COLS * BLOCK, BLOCK);
    }
    ctx.globalAlpha = 1;
  }

  if (!gameRunning || lineClearAnim) {
    ctx.textAlign = 'center';
    for (const m of messages) {
      ctx.globalAlpha = m.alpha;
      ctx.font = 'bold 18px Impact, Arial';
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText(m.text, m.x, m.y);
      ctx.fillText(m.text, m.x, m.y);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
    return;
  }

  // Ghost piece
  const gy = ghostY();
  const ghostColor = COLORS[piece.idx];
  if (gy !== piece.y) {
    for (let r=0; r<piece.shape.length; r++)
      for (let c=0; c<piece.shape[r].length; c++)
        if (piece.shape[r][c]) {
          ctx.globalAlpha = 0.18;
          ctx.fillStyle = ghostColor;
          ctx.fillRect((piece.x+c)*BLOCK, (gy+r)*BLOCK, BLOCK, BLOCK);
          ctx.globalAlpha = 1;
          ctx.strokeStyle = ghostColor;
          ctx.lineWidth = 1;
          ctx.strokeRect((piece.x+c)*BLOCK+0.5, (gy+r)*BLOCK+0.5, BLOCK-1, BLOCK-1);
        }
  }

  // Active piece
  for (let r=0; r<piece.shape.length; r++)
    for (let c=0; c<piece.shape[r].length; c++)
      if (piece.shape[r][c]) drawBlock(ctx, piece.x+c, piece.y+r, COLORS[piece.idx]);

  // Piece enter flash
  if (pieceEnterAnim > 0) {
    const flashAlpha = (pieceEnterAnim / 180) * 0.7;
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = '#ffffff';
    for (let r=0; r<piece.shape.length; r++)
      for (let c=0; c<piece.shape[r].length; c++)
        if (piece.shape[r][c])
          ctx.fillRect((piece.x+c)*BLOCK+1, (piece.y+r)*BLOCK+1, BLOCK-2, BLOCK-2);
    ctx.globalAlpha = 1;
  }

  // Floating messages
  ctx.textAlign = 'center';
  for (const m of messages) {
    ctx.globalAlpha = m.alpha;
    ctx.font = 'bold 18px Impact, Arial';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(m.text, m.x, m.y);
    ctx.fillText(m.text, m.x, m.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function updateUI() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('level-val').textContent = level;
  document.getElementById('lines-val').textContent = linesCleared;
  document.getElementById('best-val').textContent  = highScore;
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
function gameLoop(ts) {
  if (!gameRunning) return;
  const dt = lastTime ? Math.min(ts - lastTime, 100) : 0;
  lastTime = ts;

  // Line clear animation (blocks gameplay while running)
  if (lineClearAnim) {
    lineClearAnim.timer += dt;
    if (lineClearAnim.timer >= lineClearAnim.total) {
      const { rows, num, lv, prevB2b } = lineClearAnim;
      for (const r of [...rows].sort((a,b) => b-a)) {
        grid.splice(r, 1);
        grid.unshift(Array(COLS).fill(null));
      }
      // Perfect clear check (after rows removed)
      if (grid.every(row => row.every(c => c === null))) {
        const pcBase = {1:800,2:1200,3:1800,4:2000};
        let pcScore = (pcBase[num]||0) * lv;
        if (num === 4 && prevB2b) pcScore = 3200 * lv;
        score += pcScore;
        spawnMessage('PERFECT CLEAR!');
        updateUI();
      }
      lineClearAnim = null;
      newPiece();
    }
  } else {
    // Gravity
    dropTimer += dt;
    if (dropTimer >= getSpeed()) {
      dropTimer = 0;
      movePiece(0, 1);
    }

    // Lock delay
    if (lockDelayActive) {
      lockTimer += dt;
      if (lockTimer >= LOCK_DELAY) {
        lockDelayActive = false; lockTimer = 0;
        if (collides(piece.x, piece.y+1, piece.shape)) lockPiece(0, false);
      }
    }

    // DAS/ARR
    const now = ts;
    for (const key of ['ArrowLeft','ArrowRight','ArrowDown']) {
      if (keyHeld[key]) {
        if (now - keyPress[key] >= DAS && now - keyRepeat[key] >= ARR) {
          keyRepeat[key] = now;
          if (key === 'ArrowLeft')  movePiece(-1, 0);
          if (key === 'ArrowRight') movePiece( 1, 0);
          if (key === 'ArrowDown')  movePiece( 0, 1);
        }
      }
    }
  }

  // Shake timer
  if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);
  if (pieceEnterAnim > 0) pieceEnterAnim = Math.max(0, pieceEnterAnim - dt);

  // Update messages
  for (const m of messages) { m.y += m.vy; m.alpha -= 1/m.life; m.life--; }
  messages = messages.filter(m => m.life > 0);

  render();
  animFrame = requestAnimationFrame(gameLoop);
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
function togglePause() {
  if (!gameRunning) return;
  gamePaused = !gamePaused;
  const po = document.getElementById('pause-overlay');
  if (gamePaused) {
    po.style.display = 'flex';
    cancelAnimationFrame(animFrame);
    bgMusic.pause();
  } else {
    po.style.display = 'none';
    // Reset confirm state
    document.getElementById('confirm-panel').style.display = 'none';
    document.getElementById('new-game-btn').style.display = 'block';
    lastTime = null;
    bgMusic.play().catch(()=>{});
    animFrame = requestAnimationFrame(gameLoop);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { togglePause(); e.preventDefault(); return; }
  if (!gameRunning || gamePaused) return;
  const now = performance.now();

  if (['ArrowLeft','ArrowRight','ArrowDown'].includes(e.key) && !keyHeld[e.key]) {
    keyHeld[e.key]   = true;
    keyPress[e.key]  = now;
    keyRepeat[e.key] = now;
    if (e.key === 'ArrowLeft')  { movePiece(-1, 0); e.preventDefault(); }
    if (e.key === 'ArrowRight') { movePiece( 1, 0); e.preventDefault(); }
    if (e.key === 'ArrowDown')  { movePiece( 0, 1); e.preventDefault(); }
    return;
  }

  switch (e.key) {
    case 'ArrowUp':   rotatePiece();  e.preventDefault(); break;
    case ' ':         hardDrop();     e.preventDefault(); break;
    case 'Shift':
    case 'ShiftLeft':
    case 'ShiftRight':
    case 'c':
    case 'C': holdPiece();   e.preventDefault(); break;
  }
});

document.addEventListener('keyup', e => {
  if (e.key in keyHeld) keyHeld[e.key] = false;
});

// ─── INIT / RESTART ──────────────────────────────────────────────────────────
function initGame() {
  grid         = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  bag          = [];
  nextIdx      = nextFromBag();
  heldIdx      = null;
  canHold      = true;
  score        = 0;
  level        = 0;
  linesCleared = 0;
  combo        = -1;
  b2b          = false;
  lastActionRotation = false;
  pieceRotation      = 0;
  messages     = [];
  dropTimer    = 0;
  lastTime     = null;
  gameRunning  = true;
  gamePaused   = false;
  lockDelayActive = false; lockTimer = 0;
  lineClearAnim   = null;
  shakeTimer = 0; shakeAmt = 0;
  lockResets = 0;
  pieceEnterAnim = 0;
  document.getElementById('pause-overlay').style.display = 'none';
  newPiece();
  renderHold();
  updateUI();
  bgMusic.currentTime = 0;
  bgMusic.play().catch(()=>{});
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  bgMusic.pause();
  bgMusic.currentTime = 0;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('tetrisHigh', highScore);
  }
  document.getElementById('overlay').querySelector('h1').textContent = 'GAME OVER';
  document.getElementById('final-score').style.display = 'block';
  document.getElementById('final-score').textContent = `Score: ${score}  │  Best: ${highScore}`;
  document.getElementById('start-btn').textContent = 'PLAY AGAIN';
  document.getElementById('overlay').style.display = 'flex';
}

document.getElementById('new-game-btn').addEventListener('click', () => {
  document.getElementById('confirm-panel').style.display = 'block';
  document.getElementById('new-game-btn').style.display = 'none';
});

document.getElementById('confirm-yes').addEventListener('click', () => {
  document.getElementById('confirm-panel').style.display = 'none';
  document.getElementById('new-game-btn').style.display = 'block';
  document.getElementById('pause-overlay').style.display = 'none';
  gamePaused = false;
  cancelAnimationFrame(animFrame);
  initGame();
  animFrame = requestAnimationFrame(gameLoop);
});

document.getElementById('confirm-no').addEventListener('click', () => {
  document.getElementById('confirm-panel').style.display = 'none';
  document.getElementById('new-game-btn').style.display = 'block';
});

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('final-score').style.display = 'none';
  document.getElementById('overlay').querySelector('h1').textContent = 'TETRIS';
  initGame();
  animFrame = requestAnimationFrame(gameLoop);
});

// Initial render of empty board + show saved best score
document.getElementById('best-val').textContent = highScore;
render();

// ─── MOBILE TOUCH / DRAG CONTROLS ───────────────────────────────────────────
(function() {
  const SWIPE_THRESH = 20;      // px for a discrete swipe move
  const HARD_DROP_VEL = 1.8;    // px/ms for hard-drop detection
  let touchId = null;
  let startX, startY, startTime;
  let accumX = 0, accumY = 0;
  let moved = false;
  let touchRepeatTimer = null;

  boardCanvas.addEventListener('touchstart', onTouchStart, {passive: false});
  boardCanvas.addEventListener('touchmove',  onTouchMove,  {passive: false});
  boardCanvas.addEventListener('touchend',   onTouchEnd,   {passive: false});
  boardCanvas.addEventListener('touchcancel', onTouchEnd,  {passive: false});

  function onTouchStart(e) {
    if (!gameRunning || gamePaused) return;
    e.preventDefault();
    const t = e.changedTouches[0];
    touchId   = t.identifier;
    startX    = t.clientX;
    startY    = t.clientY;
    startTime = performance.now();
    accumX    = 0;
    accumY    = 0;
    moved     = false;
  }

  function onTouchMove(e) {
    if (touchId === null || !gameRunning || gamePaused) return;
    e.preventDefault();
    const t = Array.from(e.changedTouches).find(tt => tt.identifier === touchId);
    if (!t) return;

    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    // Horizontal movement (cell-snapping)
    const cellPx = BLOCK;
    const hSteps = Math.floor(Math.abs(dx - accumX) / cellPx);
    if (hSteps > 0) {
      const dir = dx > accumX ? 1 : -1;
      for (let i = 0; i < hSteps; i++) movePiece(dir, 0);
      accumX += dir * hSteps * cellPx;
      moved = true;
    }

    // Vertical soft drop (cell-snapping, downward only)
    const vSteps = Math.floor(Math.abs(dy - accumY) / cellPx);
    if (vSteps > 0 && dy > accumY) {
      for (let i = 0; i < vSteps; i++) movePiece(0, 1);
      accumY += vSteps * cellPx;
      moved = true;
    }
    // Allow upward drag to "undo" the accumY threshold (no upward move)
    if (dy < accumY - cellPx) {
      accumY = dy;
    }
  }

  function onTouchEnd(e) {
    if (touchId === null) return;
    e.preventDefault();
    const t = Array.from(e.changedTouches).find(tt => tt.identifier === touchId);
    if (!t) { touchId = null; return; }

    const elapsed = performance.now() - startTime;
    const dy = t.clientY - startY;

    // Fast downward flick → hard drop
    if (dy > 40 && elapsed > 0 && (dy / elapsed) > HARD_DROP_VEL) {
      hardDrop();
    }
    // Tap (no significant movement) → rotate
    else if (!moved && elapsed < 300 && Math.abs(dy) < 15 && Math.abs(t.clientX - startX) < 15) {
      rotatePiece();
    }

    touchId = null;
  }

  // ─── ON-SCREEN BUTTONS ───────────────────────────────────────────────────
  function setupBtn(id, action, repeatable) {
    const btn = document.getElementById(id);
    if (!btn) return;
    let repeatId = null;
    let isTouch = false; // prevent double-fire from touch + mouse

    function doAction() {
      if (!gameRunning || gamePaused) return;
      action();
      if (repeatable) {
        clearInterval(repeatId);
        repeatId = setInterval(() => {
          if (!gameRunning || gamePaused) { clearInterval(repeatId); return; }
          action();
        }, ARR);
      }
    }
    function stopRepeat() {
      clearInterval(repeatId);
      repeatId = null;
      btn.classList.remove('pressed');
    }

    // Touch events
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      isTouch = true;
      btn.classList.add('pressed');
      doAction();
    }, {passive: false});
    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      stopRepeat();
      setTimeout(() => { isTouch = false; }, 300);
    }, {passive: false});
    btn.addEventListener('touchcancel', (e) => {
      e.preventDefault();
      stopRepeat();
      setTimeout(() => { isTouch = false; }, 300);
    }, {passive: false});

    // Mouse/click fallback (skip if touch just fired)
    btn.addEventListener('mousedown', (e) => {
      if (isTouch) return;
      e.preventDefault();
      btn.classList.add('pressed');
      doAction();
    });
    btn.addEventListener('mouseup', (e) => {
      if (isTouch) return;
      stopRepeat();
    });
    btn.addEventListener('mouseleave', () => {
      if (isTouch) return;
      stopRepeat();
    });
    // Extra click fallback for devices that don't fire mousedown properly
    btn.addEventListener('click', (e) => {
      if (isTouch) return;
      e.preventDefault();
      if (!repeatable) doAction();
    });
  }

  setupBtn('tb-left',   () => movePiece(-1, 0), true);
  setupBtn('tb-right',  () => movePiece( 1, 0), true);
  setupBtn('tb-down',   () => movePiece( 0, 1), true);
  setupBtn('tb-rotate', () => rotatePiece(),     false);
  setupBtn('tb-hard',   () => hardDrop(),        false);
  setupBtn('tb-hold',   () => holdPiece(),       false);

  // Mobile pause button
  const mPause = document.getElementById('m-pause');
  if (mPause) {
    mPause.addEventListener('click', (e) => { e.preventDefault(); togglePause(); });
  }
})();

// Update mobile stat bar alongside desktop UI
const origUpdateUI = updateUI;
updateUI = function() {
  origUpdateUI();
  const ms = document.getElementById('m-score');
  const ml = document.getElementById('m-level');
  const mn = document.getElementById('m-lines');
  if (ms) ms.textContent = score;
  if (ml) ml.textContent = level;
  if (mn) mn.textContent = linesCleared;
};

// Prevent default touch behavior on game area to stop scrolling/zooming
// but allow buttons/controls to work normally
document.body.addEventListener('touchmove', e => {
  const t = e.target;
  if (t.closest('#mobile-controls') || t.closest('#mobile-top-bar') || t.closest('#overlay') || t.closest('#pause-overlay')) return;
  if (gameRunning) e.preventDefault();
}, {passive: false});
